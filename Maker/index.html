<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Buttons</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --blur-strength: 15px;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 40px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .glass-btn {
            position: relative;
            padding: 15px 40px;
            min-width: 200px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 1.1rem;
            
            /* Liquid Glass Effect */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        /* 增加液態流動感的反光層 */
        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        .glass-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }

        .glass-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V1.html" class="glass-btn" target="_blank">Editor V1</a>
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V2.html" class="glass-btn" target="_blank">Editor V2</a>
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V3.html" class="glass-btn" target="_blank">Editor V3</a>
    </div>

</body>
</html>
