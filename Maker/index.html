<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi's Liquid Glass Hub</title>
    <style>
        :root {
            /* 定義嫩色系七彩色彩 */
            --color-1: #ffdae0; /* 櫻花粉 */
            --color-2: #fff3da; /* 奶油黃 */
            --color-3: #daffdf; /* 薄荷綠 */
            --color-4: #dafbff; /* 天空藍 */
            --color-5: #e6daff; /* 薰衣草紫 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 動態流體背景 */
            background: linear-gradient(45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-4), var(--color-5));
            background-size: 400% 400%;
            animation: fluidGradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 40px;
            /* 玻璃質感核心語法 */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .glass-btn {
            display: block;
            padding: 15px 40px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            letter-spacing: 1px;
            color: #222;
        }

        .glass-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V1.html" class="glass-btn">Editor Version 1</a>
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V2.html" class="glass-btn">Editor Version 2</a>
        <a href="https://minmilo83.github.io/Notebook/Maker/editor_V3.html" class="glass-btn">Editor Version 3</a>
    </div>

</body>
</html>
